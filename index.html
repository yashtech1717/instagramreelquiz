<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Quiz</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Courier New', monospace;
}

/* CONTAINER */
.container {
    width: 100%;
    padding: 15px;
    box-sizing: border-box;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 150px;
    padding: 12px;
    background: black;
    border: 1px solid white;
    color: white;
    font-size: 16px;
    resize: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: white;
    color: black;
    border: none;
    font-size: 16px;
    margin-top: 10px;
}

/* OUTPUT */
.output {
    margin-top: 20px;
    font-size: 18px;
    text-shadow: 0 0 10px white;
}

/* OPTIONS ALIGNMENT */
.option {
    display: flex;
    margin-top: 12px;
}

.label {
    width: 30px;
    font-weight: bold;
}

.text {
    flex: 1;
}
</style>
</head>

<body>

<div class="container">

<div id="formBox">
    <h3>Enter Quiz (Line by Line)</h3>

    <textarea id="quizInput" placeholder="Type like this:
What is the capital of India?
Mumbai
New Delhi
Kolkata
Chennai"></textarea>

    <button onclick="startQuiz()">Show Quiz</button>
</div>

<div id="quizArea" class="output"></div>

</div>

<script>
function typeText(el, text, speed = 40, cb) {
    let i = 0;
    function t() {
        if (i < text.length) {
            el.innerHTML += text[i++];
            setTimeout(t, speed);
        } else if (cb) cb();
    }
    t();
}

function startQuiz() {
    document.getElementById("formBox").style.display = "none";

    const input = document.getElementById("quizInput").value.trim();
    const lines = input.split("\n").filter(line => line.trim() !== "");

    const question = lines[0];
    const options = lines.slice(1);

    const area = document.getElementById("quizArea");
    area.innerHTML = "";

    let qEl = document.createElement("div");
    area.appendChild(qEl);

    typeText(qEl, question, 40, () => showOptions(options, 0));
}

function showOptions(options, i) {
    if (i >= options.length) return;

    let div = document.createElement("div");
    div.className = "option";

    let label = document.createElement("span");
    label.className = "label";
    label.innerHTML = String.fromCharCode(65 + i) + ".";

    let text = document.createElement("span");
    text.className = "text";

    div.appendChild(label);
    div.appendChild(text);
    document.getElementById("quizArea").appendChild(div);

    typeText(text, options[i], 30, () => showOptions(options, i + 1));
}
</script>

</body>
</html>
