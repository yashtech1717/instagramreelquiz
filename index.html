<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Recorder</title>

<style>
body {
    background: black;
    color: white;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.container {
    width: 95%;
    max-width: 420px;
    text-align: center;
}

/* INPUTS */
input {
    display: block;
    margin: 8px auto;
    padding: 10px;
    width: 90%;
    background: black;
    border: 1px solid white;
    color: white;
}

/* BUTTON */
button {
    padding: 10px 20px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
}

/* OUTPUT */
.output {
    margin-top: 20px;
    font-size: 18px;
    text-shadow: 0 0 10px white;
    min-height: 150px;
}

/* OPTIONS */
.option {
    display: flex;
    align-items: flex-start;
    margin-top: 10px;
    text-align: left;
}

.label {
    width: 25px;
    font-weight: bold;
}

.text {
    flex: 1;
}

/* DOWNLOAD BUTTON */
#downloadBtn {
    display: none;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<div id="formBox">
    <h3>Create Quiz</h3>

    <input id="question" placeholder="Question">
    <input id="opt1" placeholder="Option 1">
    <input id="opt2" placeholder="Option 2">
    <input id="opt3" placeholder="Option 3">
    <input id="opt4" placeholder="Option 4">

    <button onclick="startQuiz()">Show Quiz</button>
</div>

<div id="quizArea" class="output"></div>
<button id="downloadBtn">Download Video</button>

</div>

<script>
let mediaRecorder;
let chunks = [];

function typeText(el, text, speed = 40, cb) {
    let i = 0;
    function t() {
        if (i < text.length) {
            el.innerHTML += text[i++];
            setTimeout(t, speed);
        } else if (cb) cb();
    }
    t();
}

async function startRecording() {
    const stream = await navigator.mediaDevices.getDisplayMedia({
        video: true
    });

    mediaRecorder = new MediaRecorder(stream);
    chunks = [];

    mediaRecorder.ondataavailable = e => chunks.push(e.data);

    mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);

        const a = document.getElementById("downloadBtn");
        a.style.display = "inline-block";
        a.onclick = () => {
            const link = document.createElement("a");
            link.href = url;
            link.download = "quiz_recording.webm";
            link.click();
        };
    };

    mediaRecorder.start();
}

function stopRecording() {
    if (mediaRecorder) mediaRecorder.stop();
}

function startQuiz() {
    document.getElementById("formBox").style.display = "none";

    const q = document.getElementById("question").value;
    const opts = [
        opt1.value, opt2.value, opt3.value, opt4.value
    ];

    const area = document.getElementById("quizArea");
    area.innerHTML = "";

    startRecording(); // 🎬 start recording

    let qEl = document.createElement("div");
    area.appendChild(qEl);

    typeText(qEl, q, 40, () => showOptions(opts, 0));
    
    // ⏱ stop after 5 sec
    setTimeout(stopRecording, 5000);
}

function showOptions(opts, i) {
    if (i >= opts.length) return;
    if (!opts[i].trim()) return showOptions(opts, i + 1);

    let div = document.createElement("div");
    div.className = "option";

    let l = document.createElement("span");
    l.className = "label";
    l.innerHTML = String.fromCharCode(65 + i) + ".";

    let t = document.createElement("span");
    t.className = "text";

    div.appendChild(l);
    div.appendChild(t);
    document.getElementById("quizArea").appendChild(div);

    typeText(t, opts[i], 30, () => showOptions(opts, i + 1));
}
</script>

</body>
</html>
