<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Quiz</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Courier New', monospace;
}

/* MAIN CONTAINER */
.container {
    width: 100%;
    padding: 15px;
    box-sizing: border-box;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: black;
    border: 1px solid white;
    color: white;
    font-size: 16px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: white;
    color: black;
    border: none;
    font-size: 16px;
    margin-top: 10px;
}

/* QUIZ AREA */
.output {
    margin-top: 20px;
    font-size: 18px;
    text-shadow: 0 0 10px white;
}

/* OPTIONS */
.option {
    display: flex;
    margin-top: 12px;
}

.label {
    width: 30px;
    font-weight: bold;
}

.text {
    flex: 1;
}

/* DOWNLOAD */
#downloadBtn {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<div id="formBox">
    <h3>Create Quiz</h3>

    <input id="question" placeholder="Enter Question">
    <input id="opt1" placeholder="Option 1">
    <input id="opt2" placeholder="Option 2">
    <input id="opt3" placeholder="Option 3">
    <input id="opt4" placeholder="Option 4">

    <button onclick="startQuiz()">Show Quiz</button>
</div>

<div id="quizArea" class="output"></div>

<button id="downloadBtn" onclick="downloadImage()">Save to Gallery</button>

</div>

<script>
function typeText(el, text, speed = 40, cb) {
    let i = 0;
    function t() {
        if (i < text.length) {
            el.innerHTML += text[i++];
            setTimeout(t, speed);
        } else if (cb) cb();
    }
    t();
}

function startQuiz() {
    document.getElementById("formBox").style.display = "none";

    const q = question.value;
    const opts = [opt1.value, opt2.value, opt3.value, opt4.value];

    const area = document.getElementById("quizArea");
    area.innerHTML = "";

    let qEl = document.createElement("div");
    area.appendChild(qEl);

    typeText(qEl, q, 40, () => showOptions(opts, 0));

    // after animation → enable download
    setTimeout(() => {
        document.getElementById("downloadBtn").style.display = "block";
    }, 4000);
}

function showOptions(opts, i) {
    if (i >= opts.length) return;
    if (!opts[i].trim()) return showOptions(opts, i + 1);

    let div = document.createElement("div");
    div.className = "option";

    let l = document.createElement("span");
    l.className = "label";
    l.innerHTML = String.fromCharCode(65 + i) + ".";

    let t = document.createElement("span");
    t.className = "text";

    div.appendChild(l);
    div.appendChild(t);
    document.getElementById("quizArea").appendChild(div);

    typeText(t, opts[i], 30, () => showOptions(opts, i + 1));
}

/* 📸 Screenshot instead of recording */
function downloadImage() {
    html2canvas(document.getElementById("quizArea")).then(canvas => {
        let link = document.createElement("a");
        link.download = "quiz.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
