<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Quiz</title>

<style>
body {
    background: black;
    color: white;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.container {
    text-align: center;
}

/* INPUTS */
input {
    display: block;
    margin: 10px;
    padding: 10px;
    width: 300px;
    background: black;
    border: 1px solid white;
    color: white;
    outline: none;
}

/* BUTTON */
button {
    padding: 10px 20px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

/* OUTPUT */
.output {
    margin-top: 30px;
    font-size: 20px;
    text-shadow: 0 0 10px white, 0 0 20px white;
    min-height: 150px;
}

/* OPTION ALIGNMENT 🔥 */
.option {
    display: flex;
    align-items: flex-start;
    margin-top: 12px;
    text-align: left;
    width: 400px;
}

.label {
    width: 30px;
    flex-shrink: 0;
    font-weight: bold;
}

.text {
    flex: 1;
    word-wrap: break-word;
}
</style>
</head>

<body>

<div class="container">

    <!-- FORM -->
    <div id="formBox">
        <h2>Create Quiz</h2>

        <input type="text" id="question" placeholder="Enter Question">
        <input type="text" id="opt1" placeholder="Option 1">
        <input type="text" id="opt2" placeholder="Option 2">
        <input type="text" id="opt3" placeholder="Option 3">
        <input type="text" id="opt4" placeholder="Option 4">

        <button onclick="startTyping()">Show Quiz</button>
    </div>

    <!-- OUTPUT -->
    <div class="output" id="output"></div>

</div>

<script>
function typeText(element, text, speed = 40, callback = null) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else if (callback) {
            callback();
        }
    }
    typing();
}

function startTyping() {
    // Hide form
    document.getElementById("formBox").style.display = "none";

    const output = document.getElementById("output");
    output.innerHTML = "";

    let question = document.getElementById("question").value;
    let options = [
        document.getElementById("opt1").value,
        document.getElementById("opt2").value,
        document.getElementById("opt3").value,
        document.getElementById("opt4").value
    ];

    let qElement = document.createElement("div");
    output.appendChild(qElement);

    typeText(qElement, question, 40, () => {
        showOptions(options, 0);
    });
}

function showOptions(options, index) {
    if (index >= options.length) return;

    if (options[index].trim() === "") {
        showOptions(options, index + 1);
        return;
    }

    let optElement = document.createElement("div");
    optElement.classList.add("option");

    let label = document.createElement("span");
    label.classList.add("label");
    label.innerHTML = String.fromCharCode(65 + index) + ".";

    let text = document.createElement("span");
    text.classList.add("text");

    optElement.appendChild(label);
    optElement.appendChild(text);

    document.getElementById("output").appendChild(optElement);

    typeText(text, options[index], 30, () => {
        showOptions(options, index + 1);
    });
}
</script>

</body>
</html>
